<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — PIZZA⚡OFFICIAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      background: #0d0800; color: #FFFFFF; min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 900;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.04) 3px, rgba(0,0,0,.04) 4px);
    }

    /* NAV */
    .nav {
      height: 54px; background: #0d0800; border-bottom: 1px solid #2E1C00;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; position: sticky; top: 0; z-index: 50;
    }
    .nav-logo { font-size: 14px; font-weight: 700; color: #FFFFFF; text-decoration: none; }
    .nav-logo .r { color: #FF3B30; }
    .nav-right { display: flex; gap: 2px; }
    .nav-link {
      font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: #9A7850; text-decoration: none; padding: 6px 10px; transition: color .15s;
      background: none; border: none; cursor: pointer; font-family: inherit;
    }
    .nav-link:hover { color: #FFB800; }
    .nav-out:hover { color: #FF3B30 !important; }

    .wrap { max-width: 660px; margin: 0 auto; padding: 40px 20px 64px; }

    /* GATE */
    .gate { text-align: center; padding: 80px 20px; }
    .gate-title { font-size: 20px; font-weight: 700; color: #FFB800; margin-bottom: 10px; }
    .gate-sub { font-size: 14px; color: #C8B090; line-height: 1.7; margin-bottom: 24px; }
    .btn-red {
      display: inline-block; font-family: inherit; font-size: 12px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; padding: 12px 28px;
      background: #FF3B30; color: #FFFFFF; text-decoration: none; border: none;
      cursor: pointer; transition: background .15s;
    }
    .btn-red:hover { background: #CC2F25; }

    /* HERO */
    .hero {
      display: flex; align-items: center; gap: 18px;
      padding-bottom: 28px; margin-bottom: 24px;
      border-bottom: 1px solid #2E1C00;
    }
    .avatar {
      width: 60px; height: 60px; border-radius: 50%;
      background: #1E1400; border: 2px solid #3a2400;
      overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; color: #CC9200;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .hero-info { flex: 1; min-width: 0; }
    .hero-handle { font-size: 22px; font-weight: 700; color: #FFFFFF; margin-bottom: 8px; line-height: 1; }
    .badges { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      font-size: 9px; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; padding: 4px 10px;
    }
    .badge-admin       { background: #001a00; color: #39FF14; border: 1px solid #003300; }
    .badge-contributor { background: #1a1400; color: #FFB800; border: 1px solid #3a2800; }
    .badge-member      { background: #1a0800; color: #FF8C00; border: 1px solid #3a1500; }
    .badge-anniv       { background: #1a1000; color: #FFB800; border: 1px solid #3a2000; }

    /* STATS — just 2 numbers */
    .stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 24px;
    }
    .stat {
      background: #160D00; border: 1px solid #2E1C00;
      padding: 18px 20px;
    }
    .stat-val {
      font-size: 34px; font-weight: 700; color: #FFB800;
      line-height: 1; margin-bottom: 6px; letter-spacing: -.02em;
    }
    .stat-val.orange { color: #FF8C00; }
    .stat-lbl {
      font-size: 10px; font-weight: 700; letter-spacing: .15em;
      text-transform: uppercase; color: #7A5830;
    }

    /* CONTRIBUTOR CTA */
    .contrib-cta {
      background: #160D00; border: 1px solid #2E1C00; border-left: 3px solid #FFB800;
      padding: 18px 20px; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 14px; flex-wrap: wrap;
    }
    .contrib-title { font-size: 14px; font-weight: 700; color: #FFFFFF; margin-bottom: 4px; }
    .contrib-sub { font-size: 12px; color: #C8B090; line-height: 1.5; }
    .btn-gold {
      display: inline-block; font-family: inherit; font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; padding: 10px 20px;
      background: #FFB800; color: #0d0800; text-decoration: none; border: none;
      cursor: pointer; transition: background .15s; flex-shrink: 0;
    }
    .btn-gold:hover { background: #CC9200; }

    /* SUBMIT CTA */
    .submit-cta {
      background: #160D00; border: 1px solid #2E1C00; border-left: 3px solid #FF3B30;
      padding: 18px 20px; margin-bottom: 28px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 14px; flex-wrap: wrap;
    }
    .submit-cta-title { font-size: 14px; font-weight: 700; color: #FFFFFF; margin-bottom: 4px; }
    .submit-cta-sub { font-size: 12px; color: #C8B090; line-height: 1.5; }
    .btn-red-sm {
      display: inline-block; font-family: inherit; font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; padding: 10px 20px;
      background: #FF3B30; color: #FFFFFF; text-decoration: none; border: none;
      cursor: pointer; transition: background .15s; flex-shrink: 0;
    }
    .btn-red-sm:hover { background: #CC2F25; }

    /* SECTION HEAD */
    .section-head {
      font-size: 10px; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: #CC9200;
      margin-bottom: 12px; padding-top: 24px;
      border-top: 1px solid #2E1C00;
    }

    /* PENDING NOTE */
    .pending-note {
      background: #1a1400; border: 1px solid #3a2800; border-left: 3px solid #FFB800;
      padding: 10px 14px; font-size: 12px; color: #C8B090; line-height: 1.6;
      margin-bottom: 10px;
    }

    /* REVIEW LIST */
    .review-item {
      background: #160D00; border: 1px solid #2E1C00;
      padding: 14px 16px; margin-bottom: 8px;
      transition: border-color .15s;
    }
    .review-item:hover { border-color: #3a2400; }

    /* Top row: name + rating */
    .ri-top {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 6px;
    }
    .ri-name { font-size: 14px; font-weight: 700; color: #FFFFFF; flex: 1; min-width: 0; line-height: 1.3; }
    .ri-rating { font-size: 13px; flex-shrink: 0; }

    /* Meta: location · style · date */
    .ri-meta { font-size: 11px; color: #9A7850; margin-bottom: 8px; }
    .ri-meta span + span::before { content: ' · '; color: #3a2400; }

    /* Excerpt */
    .ri-excerpt {
      font-size: 12px; color: #C8B090; line-height: 1.65;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 10px;
    }

    /* Actions row */
    .ri-actions {
      display: flex; align-items: center; gap: 8px;
      padding-top: 8px; border-top: 1px solid #1E1000;
      flex-wrap: wrap;
    }
    .ri-pending-note { font-size: 10px; color: #7A5830; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
    .ri-rejected-note { font-size: 10px; color: #CC4444; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }

    .ri-link {
      font-size: 10px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; text-decoration: none;
      padding: 3px 10px; border: 1px solid #2E1C00;
      transition: all .15s;
    }
    .ri-link-bsky { color: #9A7850; }
    .ri-link-bsky:hover { color: #FFB800; border-color: #FFB800; }
    .ri-link-db { color: #9A7850; }
    .ri-link-db:hover { color: #C8B090; border-color: #C8B090; }

    .ri-delete {
      font-family: inherit; font-size: 10px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: #5a3e1c; padding: 3px 10px;
      border: 1px solid #2E1C00; background: none; cursor: pointer;
      transition: all .15s; margin-left: auto;
    }
    .ri-delete:hover { color: #FF3B30; border-color: #FF3B30; }

    .review-empty {
      padding: 24px 0; font-size: 13px; color: #7A5830; line-height: 1.7;
    }
    .review-empty a { color: #FFB800; text-decoration: none; }

    /* PRIVACY */
    .privacy {
      margin-top: 32px; padding: 16px 0;
      border-top: 1px solid #2E1C00;
      font-size: 12px; color: #C8B090; line-height: 1.9;
    }
    .privacy strong { color: #FFFFFF; font-weight: 700; }
    .privacy a { color: #FFB800; text-decoration: none; }
    .privacy a:hover { color: #FFFFFF; }

    /* CONFIRM DIALOG */
    .confirm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.8); z-index: 400;
      align-items: center; justify-content: center; padding: 20px;
    }
    .confirm-overlay.open { display: flex; }
    .confirm-box { background: #160D00; border: 1px solid #2E1C00; padding: 28px; max-width: 380px; width: 100%; }
    .confirm-title { font-size: 15px; font-weight: 700; color: #FFFFFF; margin-bottom: 8px; }
    .confirm-sub { font-size: 13px; color: #C8B090; line-height: 1.65; margin-bottom: 22px; }
    .confirm-btns { display: flex; gap: 8px; }
    .confirm-cancel {
      font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; padding: 10px 20px; background: transparent;
      border: 1px solid #3a2400; color: #C8B090; cursor: pointer; transition: all .15s;
    }
    .confirm-cancel:hover { border-color: #C8B090; color: #FFFFFF; }
    .confirm-delete {
      font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; padding: 10px 20px; background: #FF3B30;
      color: #FFFFFF; border: none; cursor: pointer; transition: background .15s;
    }
    .confirm-delete:hover { background: #CC2F25; }

    @media (max-width: 480px) {
      .hero { flex-direction: column; align-items: flex-start; }
      .stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-logo">PIZZA<span class="r">⚡</span>OFFICIAL</a>
    <div class="nav-right">
      <a href="/database.html" class="nav-link">Database</a>
      <a href="/stats.html" class="nav-link">Stats</a>
      <button class="nav-link nav-out" onclick="doSignOut()">Sign out</button>
    </div>
  </nav>

  <div class="wrap" id="wrap">
    <div style="text-align:center;padding:60px 0;font-size:12px;color:#7A5830">Loading…</div>
  </div>

  <!-- Confirm delete -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <div class="confirm-title">Delete this review?</div>
      <div class="confirm-sub">Removes it from the public database permanently. This cannot be undone.</div>
      <div class="confirm-btns">
        <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
        <button class="confirm-delete" id="confirmBtn">Delete</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initAuth, getMyReviews } from '/auth.js';

    const RATINGS  = { 3: '⭐⭐⭐', 2: '⭐⭐', 1: '⭐', 0: 'ㄨ' };
    const BSKY_APP = 'https://bsky.app';

    let currentDid   = null;
    let pendingDelete = null;

    window.doSignOut = async () => {
      try { const { signOut } = await import('/auth.js'); await signOut(); }
      catch { location.href = '/'; }
    };

    function monthYear(s) {
      return new Date(s).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    function isAnniversary(s) {
      const d = new Date(s), n = new Date();
      return n.getFullYear() > d.getFullYear() &&
             d.getMonth() === n.getMonth() && d.getDate() === n.getDate();
    }

    function yearsOld(s) {
      return new Date().getFullYear() - new Date(s).getFullYear();
    }

    function bskyUrl(uri, handle) {
      if (!uri) return null;
      const parts = uri.split('/');
      const rkey  = parts[parts.length - 1];
      return `${BSKY_APP}/profile/${handle || 'bsky.social'}/post/${rkey}`;
    }

    async function main() {
      const auth = await initAuth();
      const wrap = document.getElementById('wrap');

      if (!auth?.user) {
        wrap.innerHTML = `
          <div class="gate">
            <div class="gate-title">Sign in to view your profile</div>
            <div class="gate-sub">Your profile shows your reviews and badges.</div>
            <a href="/" class="btn-red">Sign in with Bluesky</a>
          </div>`;
        return;
      }

      const u = auth.user;
      currentDid = u.did;

      // Fetch reviews with bluesky_uri included
      const { getDb } = await import('/auth.js');
      const db = await getDb();
      const { data: reviews } = await db
        .from('pizza_reviews')
        .select('id, name, location, rating, style, status, notes, created_at, bluesky_uri')
        .eq('contributor_did', u.did)
        .order('created_at', { ascending: false });

      const allReviews = reviews || [];
      const pending    = allReviews.filter(r => r.status === 'pending').length;
      const joinedStr  = u.created_at || new Date().toISOString();
      const ann        = isAnniversary(joinedStr);
      const yrs        = yearsOld(joinedStr);

      // Avatar
      const avatarHtml = u.avatar_url
        ? `<img src="${u.avatar_url}" alt="${u.handle}">`
        : u.handle[0].toUpperCase();

      // Role badge
      const roleBadge = u.role === 'admin'
        ? `<span class="badge badge-admin">Admin</span>`
        : u.role === 'contributor'
          ? `<span class="badge badge-contributor">Contributor</span>`
          : `<span class="badge badge-member">Member</span>`;

      const annBadge = ann
        ? `<span class="badge badge-anniv">🎂 ${yrs}-Year Member</span>` : '';

      const annMsg = ann
        ? `<div style="font-size:12px;color:#FFB800;font-weight:700;margin-top:6px">🎂 Happy ${yrs}-year anniversary!</div>` : '';

      // Stats: just Reviews + Pending
      const statsHtml = `
        <div class="stat">
          <div class="stat-val">${allReviews.length}</div>
          <div class="stat-lbl">Reviews</div>
        </div>
        <div class="stat">
          <div class="stat-val ${pending > 0 ? 'orange' : ''}">${pending}</div>
          <div class="stat-lbl">Pending</div>
        </div>`;

      // Contributor / submit CTA
      const ctaHtml = u.role === 'guest' ? `
        <div class="contrib-cta">
          <div>
            <div class="contrib-title">Become a Contributor</div>
            <div class="contrib-sub">Read the code of conduct, sign your name — instant access.</div>
          </div>
          <a href="/contributor.html" class="btn-gold">Get started</a>
        </div>` :
        `<div class="submit-cta">
          <div>
            <div class="submit-cta-title">${allReviews.length === 0 ? 'Submit your first review' : 'Submit another review'}</div>
            <div class="submit-cta-sub">Every approved review is permanent and public.</div>
          </div>
          <a href="/submit.html" class="btn-red-sm">Submit</a>
        </div>`;

      // Pending note
      const pendingNote = pending > 0 ? `
        <div class="pending-note">
          ${pending} review${pending !== 1 ? 's are' : ' is'} awaiting approval and will appear in the database once approved.
        </div>` : '';

      // Review list — no status pill, contextual links instead
      const reviewsHtml = allReviews.length === 0
        ? `<div class="review-empty">No reviews yet.${
            u.role === 'contributor' || u.role === 'admin'
              ? ' <a href="/submit.html">Submit your first →</a>' : ''
          }</div>`
        : allReviews.map(r => {
            const bsky = bskyUrl(r.bluesky_uri, u.handle);
            const date = new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            // Contextual action: approved = database link, pending = waiting note, rejected = note
            let statusLine = '';
            if (r.status === 'pending') {
              statusLine = `<span class="ri-pending-note">Awaiting approval</span>`;
            } else if (r.status === 'rejected') {
              statusLine = `<span class="ri-rejected-note">Not approved</span>`;
            }
            return `
              <div class="review-item" id="ri-${r.id}">
                <div class="ri-top">
                  <div class="ri-name">${r.name}</div>
                  <span class="ri-rating">${RATINGS[r.rating] || ''}</span>
                </div>
                <div class="ri-meta">
                  <span>${r.location}</span>
                  <span>${r.style}</span>
                  <span>${date}</span>
                </div>
                ${r.notes ? `<div class="ri-excerpt">${r.notes}</div>` : ''}
                <div class="ri-actions">
                  ${statusLine}
                  ${bsky ? `<a class="ri-link ri-link-bsky" href="${bsky}" target="_blank" rel="noopener">Bluesky ↗</a>` : ''}
                  <button class="ri-delete" onclick="confirmDelete('${r.id}')">Delete</button>
                </div>
              </div>`;
          }).join('');

      wrap.innerHTML = `
        <div class="hero">
          <div class="avatar">${avatarHtml}</div>
          <div class="hero-info">
            <div class="hero-handle">@${u.handle}</div>
            <div class="badges">${roleBadge}${annBadge}</div>
            ${annMsg}
            <div style="font-size:12px;color:#9A7850;margin-top:6px">Member since ${monthYear(joinedStr)}</div>
          </div>
        </div>

        <div class="stats">${statsHtml}</div>

        ${ctaHtml}

        <div class="section-head">Your reviews</div>
        ${pendingNote}
        <div id="reviewList">${reviewsHtml}</div>

        <div class="privacy">
          <strong>Your reviews are yours.</strong> Delete any review at any time — it's removed from the public database immediately. If you've cross-posted to Bluesky, the post stays on your Bluesky profile unless you delete it there too.<br><br>
          Pizza Official stores only your Bluesky handle and DID. &nbsp;
          <a href="https://bsky.app" target="_blank" rel="noopener">Manage your Bluesky account →</a>
        </div>`;
    }

    // Delete flow
    window.confirmDelete = function(id) {
      pendingDelete = id;
      document.getElementById('confirmOverlay').classList.add('open');
    };

    window.closeConfirm = function() {
      pendingDelete = null;
      document.getElementById('confirmOverlay').classList.remove('open');
    };

    document.getElementById('confirmBtn').addEventListener('click', async () => {
      if (!pendingDelete) return;
      const btn = document.getElementById('confirmBtn');
      btn.disabled = true;
      btn.textContent = 'Deleting…';

      try {
        const res = await fetch('/.netlify/functions/delete-review', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ did: currentDid, review_id: pendingDelete }),
        });

        const text = await res.text();
        if (!res.ok) throw new Error(text || `Server error ${res.status}`);

        // Animate out
        const el = document.getElementById(`ri-${pendingDelete}`);
        if (el) {
          el.style.transition = 'opacity .25s, transform .25s';
          el.style.opacity = '0';
          el.style.transform = 'translateX(16px)';
          setTimeout(() => el.remove(), 260);
        }
        closeConfirm();
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Delete';
        alert('Delete failed: ' + err.message);
      }
    });

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeConfirm(); });

    main();
  </script>
</body>
</html>
