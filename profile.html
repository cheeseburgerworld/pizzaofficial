<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — PIZZA⚡OFFICIAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      background: #0d0800; color: #FFFFFF; min-height: 100vh;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 100;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.05) 3px, rgba(0,0,0,.05) 4px);
    }
    nav {
      height: 54px; background: #0d0800; border-bottom: 1px solid #2E1C00;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; position: sticky; top: 0; z-index: 50;
    }
    .nav-logo { font-size: 14px; font-weight: 700; color: #FFFFFF; text-decoration: none; }
    .nav-logo .r { color: #FF3B30; }
    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: #9A7850; text-decoration: none; padding: 6px 10px;
      transition: color .15s;
    }
    .nav-link:hover { color: #FFB800; }
    .nav-signout {
      font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: #9A7850; background: none; border: none;
      cursor: pointer; padding: 6px 10px; transition: color .15s;
    }
    .nav-signout:hover { color: #FF3B30; }

    .wrap { max-width: 640px; margin: 0 auto; padding: 40px 20px; }

    /* User hero */
    .user-hero {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 32px; padding-bottom: 28px;
      border-bottom: 1px solid #2E1C00;
    }
    .avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: #1E1400; border: 1px solid #3a2400;
      overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #CC9200;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info { flex: 1; min-width: 0; }
    .user-handle { font-size: 20px; font-weight: 700; color: #FFFFFF; margin-bottom: 6px; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge {
      font-size: 10px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; padding: 3px 10px;
    }
    .badge-member      { background: #1a0800; color: #FF8C00; border: 1px solid #3a1500; }
    .badge-contributor { background: #1a1400; color: #FFB800; border: 1px solid #3a2800; }
    .badge-admin       { background: #001a00; color: #39FF14; border: 1px solid #003300; }
    .badge-anniversary { background: #1a1000; color: #FFB800; border: 1px solid #3a2000; }

    /* Membership since */
    .membership-bar {
      background: #160D00; border: 1px solid #2E1C00;
      padding: 14px 18px; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }
    .membership-since { font-size: 13px; color: #C8B090; }
    .membership-since strong { color: #FFFFFF; }
    .anniversary-msg { font-size: 13px; color: #FFB800; font-weight: 700; }

    /* Stats grid */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px; margin-bottom: 28px;
    }
    .stat-card { background: #160D00; border: 1px solid #2E1C00; padding: 16px 18px; }
    .stat-val { font-size: 28px; font-weight: 700; color: #FFB800; line-height: 1; margin-bottom: 5px; }
    .stat-lbl { font-size: 10px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: #9A7850; }

    /* Section heading */
    .section-head {
      font-size: 10px; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: #CC9200;
      margin-bottom: 12px; padding-top: 24px;
      border-top: 1px solid #2E1C00;
    }
    .section-head:first-of-type { border-top: none; padding-top: 0; }

    /* Review list */
    .review-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid #1E1000;
    }
    .review-row:last-child { border-bottom: none; }
    .rr-name { font-size: 13px; font-weight: 700; color: #FFFFFF; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rr-loc  { font-size: 11px; color: #9A7850; min-width: 80px; white-space: nowrap; }
    .rr-rating { font-size: 12px; min-width: 50px; text-align: right; }
    .status-pill {
      font-size: 9px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; padding: 2px 8px;
    }
    .s-approved { background: #1a0800; color: #FF8C00; border: 1px solid #3a1500; }
    .s-pending  { background: #1a1400; color: #FFB800; border: 1px solid #3a2800; }
    .s-rejected { background: #1a0505; color: #FF6B63; border: 1px solid #3a1010; }

    /* Contributor CTA */
    .contrib-cta {
      background: #160D00; border: 1px solid #2E1C00; border-left: 3px solid #FFB800;
      padding: 18px 20px; display: flex; align-items: center;
      justify-content: space-between; gap: 14px; flex-wrap: wrap;
    }
    .contrib-cta-text { flex: 1; }
    .contrib-cta-title { font-size: 13px; font-weight: 700; color: #FFFFFF; margin-bottom: 4px; }
    .contrib-cta-sub { font-size: 12px; color: #C8B090; line-height: 1.5; }
    .btn-gold {
      display: inline-block; font-family: inherit; font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; padding: 10px 20px;
      background: #FFB800; color: #0d0800; text-decoration: none;
      border: none; cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    .btn-gold:hover { background: #CC9200; }

    .empty { font-size: 13px; color: #9A7850; padding: 16px 0; line-height: 1.6; }
    .loading { font-size: 12px; color: #7A5830; padding: 40px 0; text-align: center; }

    .gate {
      text-align: center; padding: 60px 20px;
    }
    .gate-title { font-size: 20px; font-weight: 700; color: #FFB800; margin-bottom: 10px; }
    .gate-sub { font-size: 14px; color: #C8B090; line-height: 1.7; margin-bottom: 24px; }
    .btn-red {
      display: inline-block; font-family: inherit; font-size: 12px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; padding: 12px 28px;
      background: #FF3B30; color: #FFFFFF; text-decoration: none;
      border: none; cursor: pointer; transition: background .15s;
    }
    .btn-red:hover { background: #CC2F25; }

    @media (max-width: 480px) {
      .user-hero { flex-direction: column; align-items: flex-start; }
      .rr-loc { display: none; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">PIZZA<span class="r">⚡</span>OFFICIAL</a>
    <div class="nav-links">
      <a href="/database.html" class="nav-link">Database</a>
      <a href="/stats.html" class="nav-link">Stats</a>
      <button class="nav-signout" id="signoutBtn" onclick="doSignOut()">Sign out</button>
    </div>
  </nav>

  <div class="wrap" id="wrap">
    <div class="loading">Loading your profile…</div>
  </div>

  <script type="module">
    import { initAuth, getMyReviews } from '/auth.js';

    const RATINGS = { 3: '⭐⭐⭐', 2: '⭐⭐', 1: '⭐', 0: 'ㄨ' };

    function monthName(d) {
      return ['January','February','March','April','May','June','July','August','September','October','November','December'][d.getMonth()];
    }

    function memberSince(dateStr) {
      const d = new Date(dateStr);
      return `${monthName(d)} ${d.getFullYear()}`;
    }

    function isAnniversary(dateStr) {
      const joined = new Date(dateStr);
      const now = new Date();
      const years = (now - joined) / (1000 * 60 * 60 * 24 * 365.25);
      return { years: Math.floor(years), isOver1: years >= 1 };
    }

    async function main() {
      const auth = await initAuth();
      const wrap = document.getElementById('wrap');

      if (!auth?.user) {
        wrap.innerHTML = `
          <div class="gate">
            <div class="gate-title">Sign in to see your profile</div>
            <div class="gate-sub">Your profile shows your reviews, badges, and membership stats.<br>Sign in with your Bluesky account to continue.</div>
            <a href="/" class="btn-red">Sign in with Bluesky</a>
          </div>`;
        return;
      }

      const u = auth.user;
      const reviews = await getMyReviews(u.did);
      const approved = reviews.filter(r => r.status === 'approved');
      const pending  = reviews.filter(r => r.status === 'pending');
      const ann      = isAnniversary(u.created_at || new Date().toISOString());

      // Badge HTML
      let roleBadge = '';
      if (u.role === 'admin') {
        roleBadge = `<span class="badge badge-admin">Admin</span>`;
      } else if (u.role === 'contributor') {
        roleBadge = `<span class="badge badge-contributor">Contributor</span>`;
      } else {
        roleBadge = `<span class="badge badge-member">Member</span>`;
      }

      const annBadge = ann.isOver1
        ? `<span class="badge badge-anniversary">🎂 ${ann.years}-Year Member</span>`
        : '';

      // Avatar
      const avatarHtml = u.avatar_url
        ? `<img src="${u.avatar_url}" alt="${u.handle}">`
        : u.handle[0].toUpperCase();

      // Anniversary message
      const today = new Date();
      const joined = new Date(u.created_at || today);
      const sameDay = today.getMonth() === joined.getMonth() && today.getDate() === joined.getDate();
      const annMsg = sameDay && ann.isOver1
        ? `<div class="anniversary-msg">🎂 Happy ${ann.years}-year anniversary!</div>`
        : '';

      // Contributor CTA (only for members)
      const contribSection = u.role === 'guest' ? `
        <div class="contrib-cta">
          <div class="contrib-cta-text">
            <div class="contrib-cta-title">Become a Contributor</div>
            <div class="contrib-cta-sub">Read the code of conduct, sign your name — unlocks review submissions instantly.</div>
          </div>
          <a href="/contributor.html" class="btn-gold">Get started</a>
        </div>` : '';

      // Reviews list
      const reviewsHtml = reviews.length === 0
        ? `<div class="empty">No reviews yet. ${u.role === 'contributor' || u.role === 'admin' ? '<a href="/submit.html" style="color:#FFB800;text-decoration:none">Submit your first review →</a>' : 'Become a contributor to start submitting.'}</div>`
        : reviews.map(r => `
          <div class="review-row">
            <span class="rr-name">${r.name}</span>
            <span class="rr-loc">${r.location}</span>
            <span class="rr-rating">${RATINGS[r.rating] || ''}</span>
            <span class="status-pill s-${r.status}">${r.status}</span>
          </div>`).join('');

      wrap.innerHTML = `
        <div class="user-hero">
          <div class="avatar">${avatarHtml}</div>
          <div class="user-info">
            <div class="user-handle">@${u.handle}</div>
            <div class="badges">${roleBadge}${annBadge}</div>
          </div>
        </div>

        <div class="membership-bar">
          <span class="membership-since">Member since <strong>${memberSince(u.created_at || new Date().toISOString())}</strong></span>
          ${annMsg}
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-val">${reviews.length}</div>
            <div class="stat-lbl">Reviews</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">${approved.length}</div>
            <div class="stat-lbl">Approved</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">${pending.length}</div>
            <div class="stat-lbl">Pending</div>
          </div>
          <div class="stat-card">
            <div class="stat-val">${ann.isOver1 ? ann.years + 'yr' : '&lt;1yr'}</div>
            <div class="stat-lbl">Tenure</div>
          </div>
        </div>

        ${contribSection}

        <div class="section-head">Your reviews</div>
        ${reviewsHtml}

        ${u.role === 'contributor' || u.role === 'admin' ? `
          <div style="margin-top:16px">
            <a href="/submit.html" style="display:inline-block;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:10px 20px;background:transparent;color:#FFB800;border:1px solid #3a2800;text-decoration:none;transition:all .15s" onmouseover="this.style.background='#FFB800';this.style.color='#0d0800'" onmouseout="this.style.background='transparent';this.style.color='#FFB800'">+ Submit a new review</a>
          </div>` : ''}
      `;
    }

    window.doSignOut = async function() {
      try { const { signOut } = await import('/auth.js'); await signOut(); }
      catch (_) { location.href = '/'; }
    };

    main();
  </script>
</body>
</html>
