<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIZZA⚡OFFICIAL — The world's pizza, documented.</title>
  <meta name="description" content="The world's pizza, documented. Community-built. ATProto-native. No algorithms. No ads.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      background: #0d0800; color: #FFFFFF;
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 100;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.05) 3px, rgba(0,0,0,.05) 4px);
    }

    /* NAV */
    .nav {
      height: 54px; background: #0d0800; border-bottom: 1px solid #2E1C00;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; flex-shrink: 0; position: sticky; top: 0; z-index: 50;
    }
    .nav-logo { font-size: 14px; font-weight: 700; color: #FFFFFF; text-decoration: none; letter-spacing: -.01em; }
    .nav-logo .r { color: #FF3B30; }
    .nav-auth {
      font-family: inherit; font-size: 12px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      padding: 8px 16px; background: transparent; color: #FFFFFF;
      border: 1px solid #3a2400; cursor: pointer;
      transition: border-color .15s, color .15s; white-space: nowrap;
      text-decoration: none;
    }
    .nav-auth:hover { border-color: #FFB800; color: #FFB800; }
    .nav-auth.is-member { border-color: #4ABA5A; color: #4ABA5A; }
    .nav-auth.is-contributor { border-color: #FFB800; color: #FFB800; }
    .nav-auth.is-admin { border-color: #FF3B30; color: #FF3B30; }

    /* SPLASH */
    .splash {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center;
    }
    .splash-inner { width: 100%; max-width: 600px; }

    .eyebrow {
      font-size: 11px; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: #C8B090; margin-bottom: 22px;
    }

    /* Logo: display:table + auto margin = true centering regardless of letter-spacing */
    .logo {
      font-size: clamp(30px, 8.5vw, 100px);
      font-weight: 700; letter-spacing: -.02em; line-height: 1;
      color: #FFFFFF; margin-bottom: 22px;
      display: table; margin-left: auto; margin-right: auto;
    }
    .logo .r { color: #FF3B30; }

    .punch { font-size: clamp(15px, 3vw, 20px); font-weight: 700; color: #FFB800; margin-bottom: 10px; }
    .sub   { font-size: 14px; color: #C8B090; line-height: 1.75; margin-bottom: 36px; }

    /* Role state card — shown when logged in */
    .state-card {
      display: none;
      background: #160D00; border: 1px solid #2E1C00;
      padding: 18px 20px; margin-bottom: 28px;
      text-align: left;
    }
    .state-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .state-handle { font-size: 15px; font-weight: 700; color: #FFFFFF; }
    .state-badge {
      font-size: 10px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; padding: 3px 10px;
    }
    .badge-member      { background: #0a2010; color: #4ABA5A; border: 1px solid #1a4020; }
    .badge-contributor { background: #1a1400; color: #FFB800; border: 1px solid #3a2800; }
    .badge-admin       { background: #1a0505; color: #FF3B30; border: 1px solid #3a1010; }
    .state-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .state-link {
      font-family: inherit; font-size: 11px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      color: #C8B090; text-decoration: none;
      padding: 6px 12px; border: 1px solid #2E1C00;
      transition: border-color .15s, color .15s; background: none; cursor: pointer;
    }
    .state-link:hover { border-color: #C8B090; color: #FFFFFF; }
    .state-link.gold { color: #FFB800; border-color: #4a2e00; }
    .state-link.gold:hover { border-color: #FFB800; background: #FFB800; color: #0d0800; }
    .state-link.red { color: #FF3B30; border-color: #3a1010; font-size: 10px; }
    .state-link.red:hover { color: #FFFFFF; border-color: #FF3B30; }

    /* sign-in form */
    .signin-form { display: none; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 28px; }
    .signin-form.open { display: flex; }
    .signin-row { display: flex; gap: 8px; width: 100%; max-width: 340px; }
    .signin-input {
      flex: 1; min-width: 0; background: #1E1400; border: 1px solid #3a2400;
      color: #FFFFFF; font-family: inherit; font-size: 15px;
      padding: 12px 14px; outline: none; transition: border-color .15s;
    }
    .signin-input::placeholder { color: #6a4820; }
    .signin-input:focus { border-color: #FFB800; }
    .signin-go {
      font-family: inherit; font-size: 12px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      padding: 12px 20px; background: #FF3B30; color: #FFFFFF;
      border: none; cursor: pointer; transition: background .15s; flex-shrink: 0;
    }
    .signin-go:hover:not(:disabled) { background: #CC2F25; }
    .signin-go:disabled { opacity: .4; cursor: not-allowed; }
    .signin-hint { font-size: 12px; color: #9A7850; }
    .signin-err  { font-size: 12px; color: #FF3B30; display: none; }

    /* CTAs */
    .ctas { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn-gold {
      display: inline-block; font-family: inherit; font-size: 13px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; padding: 14px 32px;
      background: #FFB800; color: #0d0800; text-decoration: none;
      border: none; cursor: pointer; transition: background .15s; white-space: nowrap;
    }
    .btn-gold:hover { background: #CC9200; }
    .btn-outline {
      display: inline-block; font-family: inherit; font-size: 13px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase; padding: 14px 32px;
      background: transparent; color: #FFFFFF; text-decoration: none;
      border: 1px solid #4a2e00; cursor: pointer;
      transition: border-color .15s, color .15s; white-space: nowrap;
    }
    .btn-outline:hover { border-color: #C8B090; color: #FFB800; }

    /* BOTTOM STRIP */
    .bottom-strip {
      border-top: 1px solid #1E1000; padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px; flex-shrink: 0;
    }
    .bottom-links, .bottom-right { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
    .bottom-links a, .bottom-right a {
      font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: #C8B090; text-decoration: none; transition: color .15s;
    }
    .bottom-links a:hover, .bottom-right a:hover { color: #FFB800; }
    .bottom-copy { font-size: 11px; color: #7A5830; white-space: nowrap; }

    @media (max-width: 480px) {
      .ctas { flex-direction: column; align-items: center; }
      .btn-gold, .btn-outline { width: 100%; max-width: 280px; text-align: center; padding: 16px; }
      .signin-row { flex-direction: column; }
      .signin-go { width: 100%; }
      .bottom-strip { flex-direction: column; align-items: flex-start; gap: 12px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-logo">PIZZA<span class="r">⚡</span>OFFICIAL</a>
    <button class="nav-auth" id="navAuthBtn" onclick="toggleSignIn()">Sign In</button>
  </nav>

  <main class="splash">
    <div class="splash-inner">

      <div class="eyebrow">ATProto-native &nbsp;·&nbsp; Decentralized &nbsp;·&nbsp; Open Source</div>

      <div class="logo">PIZZA<span class="r">⚡</span>OFFICIAL</div>

      <div class="punch">The world's pizza, documented.</div>
      <div class="sub">Community-built. No algorithms. No ads.</div>

      <!-- Logged-in state card (shown by JS) -->
      <div class="state-card" id="stateCard">
        <div class="state-top">
          <span class="state-handle" id="stateHandle"></span>
          <span class="state-badge badge-member" id="stateBadge">Member</span>
        </div>
        <div class="state-actions" id="stateActions"></div>
      </div>

      <!-- Sign-in form -->
      <div class="signin-form" id="signinForm">
        <div class="signin-row">
          <input type="text" class="signin-input" id="handleInput"
            placeholder="you.bsky.social" autocomplete="off" autocapitalize="off" spellcheck="false">
          <button class="signin-go" id="signinGoBtn" onclick="doSignIn()">Sign In</button>
        </div>
        <div class="signin-hint">Your Bluesky handle — no password shared with us</div>
        <div class="signin-err" id="signinErr"></div>
      </div>

      <!-- CTAs -->
      <div class="ctas" id="ctaRow">
        <a href="/database.html" class="btn-gold">Browse Database</a>
        <a href="/contributor.html" class="btn-outline" id="ctaContribute">Contribute</a>
      </div>

    </div>
  </main>

  <div class="bottom-strip">
    <div class="bottom-links">
      <a href="/database.html">Database</a>
      <a href="/stats.html">Stats</a>
    </div>
    <div class="bottom-right">
      <a href="https://cheeseburger.world" target="_blank" rel="noopener">CB⚡DB</a>
      <a href="https://github.com/cheeseburgerworld/pizzaofficial" target="_blank" rel="noopener">GitHub</a>
      <span class="bottom-copy">© 2026 Cheeseburger World LLC</span>
    </div>
  </div>

  <script type="module">
    const $ = id => document.getElementById(id);

    window.toggleSignIn = function() {
      const form = $('signinForm');
      const open = form.classList.toggle('open');
      $('navAuthBtn').textContent = open ? 'Cancel' : 'Sign In';
      if (open) setTimeout(() => $('handleInput').focus(), 50);
    };

    window.doSignIn = async function() {
      const handle = $('handleInput').value.trim();
      const btn = $('signinGoBtn'), err = $('signinErr');
      err.style.display = 'none';
      if (!handle) { err.textContent = 'Enter your Bluesky handle'; err.style.display = 'block'; $('handleInput').focus(); return; }
      btn.disabled = true; btn.textContent = '…';
      try {
        const { signIn } = await import('/auth.js');
        await signIn(handle);
      } catch (e) {
        btn.disabled = false; btn.textContent = 'Sign In';
        err.textContent = e.message?.includes('resolve') ? 'Handle not found — check spelling' : 'Failed: ' + e.message;
        err.style.display = 'block';
      }
    };

    $('handleInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSignIn(); });

    async function checkAuth() {
      try {
        const { initAuth } = await import('/auth.js');
        const auth = await initAuth();
        if (!auth?.user) return;
        const u = auth.user;

        // Nav button
        const navBtn = $('navAuthBtn');
        navBtn.textContent = '@' + u.handle;
        navBtn.onclick = () => location.href = '/profile.html';
        navBtn.className = 'nav-auth is-' + (u.role === 'guest' ? 'member' : u.role);

        // State card
        $('stateHandle').textContent = '@' + u.handle;

        const badge = $('stateBadge');
        if (u.role === 'admin') {
          badge.textContent = 'Admin';
          badge.className = 'state-badge badge-admin';
        } else if (u.role === 'contributor') {
          badge.textContent = 'Contributor ⭐';
          badge.className = 'state-badge badge-contributor';
        } else {
          badge.textContent = 'Member';
          badge.className = 'state-badge badge-member';
        }

        // Actions inside card
        const actions = $('stateActions');
        if (u.role === 'contributor' || u.role === 'admin') {
          actions.innerHTML = `
            <a href="/submit.html" class="state-link gold">Submit a review</a>
            <a href="/profile.html" class="state-link">Profile</a>
            <a href="/stats.html" class="state-link">Stats</a>
            <button class="state-link red" onclick="doSignOut()">Sign out</button>`;
          // Change contribute CTA to Submit
          $('ctaContribute').textContent = 'Submit a Review';
          $('ctaContribute').href = '/submit.html';
        } else {
          actions.innerHTML = `
            <a href="/contributor.html" class="state-link gold">Become a Contributor ⭐</a>
            <a href="/profile.html" class="state-link">Profile</a>
            <button class="state-link red" onclick="doSignOut()">Sign out</button>`;
        }

        $('stateCard').style.display = 'block';
        $('signinForm').classList.remove('open');

      } catch (_) {}
    }

    window.doSignOut = async function() {
      try { const { signOut } = await import('/auth.js'); await signOut(); }
      catch (_) { location.href = '/'; }
    };

    checkAuth();
  </script>
</body>
</html>
