<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database — PIZZA⚡OFFICIAL</title>
  <meta name="description" content="Browse the world's pizza database. Community-built reviews by city, style, and rating.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }

    :root {
      --bg:      #0d0800;
      --bg2:     #160D00;
      --bg3:     #1E1400;
      --gold:    #FFB800;
      --gold2:   #CC9200;
      --red:     #FF3B30;
      --white:   #FFFFFF;
      --text2:   #C8B090;
      --text3:   #9A7850;
      --muted:   #7A5830;
      --border:  #2E1C00;
      --border2: #1E1000;
      --mono:    'IBM Plex Mono', 'Courier New', monospace;
    }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      pointer-events: none; z-index: 900;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,.04) 3px, rgba(0,0,0,.04) 4px
      );
    }

    /* ── NAV ─────────────────────────────────────── */
    .nav {
      height: 54px; background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 20px; position: sticky; top: 0; z-index: 50;
    }
    .nav-logo {
      font-size: 14px; font-weight: 700;
      color: var(--white); text-decoration: none;
    }
    .nav-logo .r { color: var(--red); }

    .nav-right { display: flex; align-items: center; gap: 2px; }
    .nav-link {
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text3);
      text-decoration: none; padding: 6px 10px;
      transition: color .15s; background: none;
      border: none; cursor: pointer; font-family: var(--mono);
    }
    .nav-link:hover { color: var(--gold); }
    .nav-link.active { color: var(--gold); }
    .nav-user {
      font-size: 11px; font-weight: 700; color: var(--text3);
      text-decoration: none; padding: 5px 10px;
      border: 1px solid var(--border);
      transition: all .15s;
    }
    .nav-user:hover { border-color: var(--gold); color: var(--gold); }

    /* ── PAGE HEAD ───────────────────────────────── */
    .page-head {
      max-width: 1100px; margin: 0 auto;
      padding: 28px 20px 0;
    }
    .head-row {
      display: flex; align-items: flex-end;
      justify-content: space-between; gap: 12px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .page-title {
      font-size: clamp(30px, 6vw, 52px);
      font-weight: 700; letter-spacing: -.03em;
      color: var(--white); line-height: 1;
    }
    .live-badge {
      display: flex; align-items: center; gap: 7px;
      font-size: 11px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--gold);
      padding-bottom: 4px;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold); flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,184,0,.4); }
      50%      { box-shadow: 0 0 0 6px rgba(255,184,0,0); }
    }

    /* ── FILTERS ─────────────────────────────────── */
    .filter-bar {
      max-width: 1100px; margin: 0 auto;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .filter-row {
      display: flex; align-items: center;
      padding: 0 20px; overflow-x: auto;
      scrollbar-width: none; gap: 0;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-row + .filter-row { border-top: 1px solid var(--border2); }

    .filter-label {
      font-size: 10px; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: #5a3e1c;
      padding: 10px 14px 10px 0; white-space: nowrap;
      flex-shrink: 0;
    }
    .f-btn {
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 10px 14px; background: transparent;
      border: none; border-bottom: 2px solid transparent;
      color: var(--text3); cursor: pointer; white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .f-btn:hover { color: var(--white); }
    .f-btn.on { color: var(--gold); border-bottom-color: var(--gold); }

    /* City dropdown */
    .city-select {
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 8px 12px; background: transparent;
      border: 1px solid var(--border); border-radius: 0;
      color: var(--text3); cursor: pointer;
      -webkit-appearance: none; appearance: none;
      outline: none; transition: all .15s;
      margin: 6px 0;
    }
    .city-select:hover, .city-select:focus {
      border-color: var(--gold2); color: var(--gold);
    }
    .city-select option {
      background: var(--bg2); color: var(--white);
      font-size: 12px; text-transform: none; letter-spacing: 0;
    }

    /* ── CONTENT ─────────────────────────────────── */
    .content {
      max-width: 1100px; margin: 0 auto;
      padding: 20px 20px 60px;
    }

    .result-bar {
      display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
      margin-bottom: 18px; flex-wrap: wrap;
    }
    .result-count { font-size: 12px; color: var(--muted); }
    .sort-row { display: flex; gap: 4px; }
    .sort-btn {
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
      padding: 5px 12px; background: transparent;
      border: 1px solid var(--border); color: var(--muted);
      cursor: pointer; transition: all .15s;
    }
    .sort-btn:hover { border-color: var(--text3); color: var(--text2); }
    .sort-btn.on { border-color: var(--gold); color: var(--gold); }

    /* ── CITY SECTION HEADING ───────────────────── */
    .city-heading {
      font-size: 11px; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--gold2);
      padding: 20px 0 10px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .city-heading:first-child { border-top: none; padding-top: 0; }

    /* ── CARD GRID ───────────────────────────────── */
    .grid {
      display: grid; gap: 12px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 560px)  { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 860px)  { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1140px) { .grid { grid-template-columns: repeat(4, 1fr); } }

    /* ── CARD ────────────────────────────────────── */
    .card {
      background: var(--bg2); border: 1px solid var(--border);
      cursor: pointer; display: flex; flex-direction: column;
      overflow: hidden; position: relative;
      transition: border-color .2s, box-shadow .2s;
    }
    .card:hover {
      border-color: var(--gold);
      box-shadow: 0 4px 20px rgba(255,184,0,.07);
    }

    /* Card with image */
    .card-img {
      width: 100%; aspect-ratio: 16 / 10;
      background: var(--bg3); overflow: hidden; flex-shrink: 0;
      position: relative;
    }
    .card-img img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform .4s ease;
    }
    .card:hover .card-img img { transform: scale(1.04); }

    .img-rating-badge {
      position: absolute; bottom: 10px; left: 10px;
      font-size: 12px; font-weight: 700;
      background: rgba(13,8,0,.88); padding: 5px 10px;
      border: 1px solid rgba(255,184,0,.25);
      backdrop-filter: blur(8px); line-height: 1;
      letter-spacing: .02em;
    }

    /* Card without image — accent bar on left */
    .card.no-img { border-left-width: 3px; }
    .card.no-img.rat-3 { border-left-color: var(--gold); }
    .card.no-img.rat-2 { border-left-color: var(--gold2); }
    .card.no-img.rat-1 { border-left-color: #5a3e1c; }
    .card.no-img.rat-0 { border-left-color: var(--border); }

    /* Card body */
    .card-body {
      padding: 13px 15px 11px;
      display: flex; flex-direction: column;
      flex: 1; gap: 0;
    }

    /* No-image inline rating */
    .inline-rating {
      font-size: 12px; font-weight: 700;
      color: var(--gold); margin-bottom: 8px; line-height: 1;
      display: flex; align-items: center; gap: 7px;
    }
    .inline-rating .rl {
      font-size: 9px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
    }

    .card-name {
      font-size: 14px; font-weight: 700; color: var(--white);
      line-height: 1.25; margin-bottom: 5px;
    }
    .card-meta {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text2);
      margin-bottom: 9px; flex-wrap: wrap;
    }
    .card-sep { color: #3a2400; }
    .style-tag {
      font-size: 9px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
      border: 1px solid var(--border); padding: 2px 7px;
      flex-shrink: 0;
    }
    .exp-tag {
      font-size: 9px; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; color: #5a3e1c; flex-shrink: 0;
    }
    .card-excerpt {
      font-size: 12px; color: var(--text2); line-height: 1.7; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 10px;
    }
    .card-footer {
      display: flex; align-items: center;
      justify-content: space-between; gap: 6px;
      padding-top: 9px; border-top: 1px solid var(--border2);
      margin-top: auto;
    }
    .card-reviewer {
      font-size: 10px; color: var(--muted); font-weight: 700;
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; flex: 1;
    }
    .card-discuss {
      font-size: 10px; color: var(--muted); text-decoration: none;
      font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
      padding: 3px 8px; border: 1px solid var(--border);
      transition: all .15s; flex-shrink: 0; white-space: nowrap;
    }
    .card-discuss:hover { color: var(--gold); border-color: var(--gold); }

    /* ── SKELETON ────────────────────────────────── */
    .skel {
      background: var(--bg2); border: 1px solid var(--border);
      height: 240px; animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100%{opacity:.4}50%{opacity:.8} }

    /* ── EMPTY ───────────────────────────────────── */
    .empty {
      grid-column: 1/-1; text-align: center;
      padding: 60px 20px;
    }
    .empty-icon { font-size: 36px; margin-bottom: 14px; opacity: .35; }
    .empty-title { font-size: 15px; font-weight: 700; color: var(--text2); margin-bottom: 8px; }
    .empty-sub { font-size: 13px; color: var(--muted); line-height: 1.7; }
    .empty-sub a { color: var(--gold); text-decoration: none; }

    /* ── DRAWER ──────────────────────────────────── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.72); z-index: 200;
      backdrop-filter: blur(3px);
    }
    .overlay.open { display: block; }

    .drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg2); border-top: 1px solid var(--border);
      z-index: 300; max-height: 92vh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    .drawer.open { transform: translateY(0); }
    @media (min-width: 700px) {
      .drawer {
        left: auto; top: 0; bottom: 0; right: 0; width: min(500px, 90vw);
        max-height: 100vh; border-top: none; border-left: 1px solid var(--border);
        transform: translateX(100%);
      }
      .drawer.open { transform: translateX(0); }
    }

    .drawer-handle {
      width: 36px; height: 4px; background: #3a2400;
      border-radius: 2px; margin: 12px auto 0;
    }
    @media (min-width: 700px) { .drawer-handle { display: none; } }

    .drawer-img {
      width: 100%; aspect-ratio: 16/9;
      background: var(--bg3); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .drawer-img img { width: 100%; height: 100%; object-fit: cover; }
    .drawer-img .placeholder { font-size: 52px; opacity: .12; }

    .drawer-body { padding: 20px 22px 36px; }

    .d-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px; margin-bottom: 6px;
    }
    .d-name {
      font-size: 20px; font-weight: 700; color: var(--white);
      line-height: 1.2; flex: 1;
    }
    .d-close {
      width: 32px; height: 32px; background: var(--bg3);
      border: 1px solid var(--border); color: var(--text3);
      font-size: 18px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .15s; font-family: var(--mono);
    }
    .d-close:hover { border-color: var(--red); color: var(--red); }

    .d-rating { font-size: 17px; margin-bottom: 12px; line-height: 1; }
    .d-rating-lbl { font-size: 13px; color: var(--gold); font-weight: 700; }

    .d-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .d-tag {
      font-size: 10px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--text2);
      border: 1px solid var(--border); padding: 4px 10px;
    }
    .d-tag.hi { border-color: var(--gold); color: var(--gold); }

    .d-hr { border: none; border-top: 1px solid var(--border2); margin: 14px 0; }

    .d-notes {
      font-size: 14px; color: var(--white); line-height: 1.8;
      margin-bottom: 18px;
    }

    .d-reviewer {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .d-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--bg3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--muted);
      overflow: hidden; flex-shrink: 0;
    }
    .d-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .d-reviewer-info { flex: 1; min-width: 0; }
    .d-reviewer-handle { font-size: 12px; font-weight: 700; color: var(--text2); }
    .d-reviewer-badge {
      font-size: 9px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; padding: 1px 6px;
      background: #1a1400; color: var(--gold); border: 1px solid #3a2800;
    }
    .d-reviewer-date { font-size: 11px; color: var(--muted); margin-left: auto; flex-shrink: 0; }

    .d-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .d-btn {
      display: inline-block; font-family: var(--mono); font-size: 11px;
      font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      padding: 9px 18px; text-decoration: none; cursor: pointer;
      transition: all .15s; white-space: nowrap; border: none;
    }
    .d-btn-gold { background: var(--gold); color: var(--bg); }
    .d-btn-gold:hover { background: var(--gold2); }
    .d-btn-outline {
      background: transparent; color: var(--text2);
      border: 1px solid var(--border);
    }
    .d-btn-outline:hover { border-color: var(--text2); color: var(--white); }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-logo">PIZZA<span class="r">⚡</span>OFFICIAL</a>
    <div class="nav-right">
      <a href="/database.html" class="nav-link active">Database</a>
      <a href="/stats.html" class="nav-link">Stats</a>
      <a href="/format.html" class="nav-link">Format</a>
      <a href="/" class="nav-user" id="navUser">Sign In</a>
    </div>
  </nav>

  <!-- Page head -->
  <div class="page-head">
    <div class="head-row">
      <div class="page-title">THE DATABASE</div>
      <div class="live-badge" id="liveBadge">
        <div class="live-dot"></div>
        <span>Loading</span>
      </div>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">

    <div class="filter-row">
      <span class="filter-label">Rating</span>
      <button class="f-btn on" data-f="rating" data-v="">All</button>
      <button class="f-btn" data-f="rating" data-v="3">⭐⭐⭐ Legendary</button>
      <button class="f-btn" data-f="rating" data-v="2">⭐⭐ Worth a Trip</button>
      <button class="f-btn" data-f="rating" data-v="1">⭐ Solid</button>
      <button class="f-btn" data-f="rating" data-v="0">ㄨ Skip It</button>
    </div>

    <div class="filter-row">
      <span class="filter-label">Style</span>
      <button class="f-btn on" data-f="style" data-v="">All</button>
      <button class="f-btn" data-f="style" data-v="NY Style">NY</button>
      <button class="f-btn" data-f="style" data-v="Neapolitan">Neapolitan</button>
      <button class="f-btn" data-f="style" data-v="Roman">Roman</button>
      <button class="f-btn" data-f="style" data-v="Detroit / Sicilian">Detroit</button>
      <button class="f-btn" data-f="style" data-v="Deep Dish">Deep Dish</button>
      <button class="f-btn" data-f="style" data-v="Tavern">Tavern</button>
      <button class="f-btn" data-f="style" data-v="Fast / Counter">Fast</button>
    </div>

    <div class="filter-row">
      <span class="filter-label">Experience</span>
      <button class="f-btn on" data-f="experience" data-v="">All</button>
      <button class="f-btn" data-f="experience" data-v="Slice / Counter">Slice</button>
      <button class="f-btn" data-f="experience" data-v="Casual Sit-Down">Casual</button>
      <button class="f-btn" data-f="experience" data-v="Full Service">Full Service</button>
      <button class="f-btn" data-f="experience" data-v="Takeout / Delivery">Takeout</button>
    </div>

    <!-- City row — populated dynamically from review data -->
    <div class="filter-row" id="cityRow" style="display:none">
      <span class="filter-label">City</span>
      <select class="city-select" id="citySelect">
        <option value="">All Cities</option>
      </select>
    </div>

  </div>

  <!-- Content -->
  <div class="content">
    <div class="result-bar">
      <span class="result-count" id="resultCount">Loading…</span>
      <div class="sort-row">
        <button class="sort-btn on" data-sort="recent">Recent</button>
        <button class="sort-btn" data-sort="rating">Top Rated</button>
      </div>
    </div>
    <div id="output">
      <!-- Skeleton loaders -->
      <div class="grid">
        <div class="skel"></div><div class="skel"></div>
        <div class="skel"></div><div class="skel"></div>
        <div class="skel"></div><div class="skel"></div>
      </div>
    </div>
  </div>

  <!-- Overlay + Drawer -->
  <div class="overlay" id="overlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-img" id="dImg"></div>
    <div class="drawer-body">
      <div class="d-header">
        <div class="d-name" id="dName"></div>
        <button class="d-close" onclick="closeDrawer()">×</button>
      </div>
      <div class="d-rating" id="dRating"></div>
      <div class="d-tags" id="dTags"></div>
      <hr class="d-hr">
      <div class="d-notes" id="dNotes"></div>
      <div class="d-reviewer" id="dReviewer"></div>
      <div class="d-actions" id="dActions"></div>
    </div>
  </div>

  <script type="module">
    const RATINGS = {
      3: { s: '⭐⭐⭐', l: 'Legendary' },
      2: { s: '⭐⭐',  l: 'Worth a Trip' },
      1: { s: '⭐',    l: 'Solid' },
      0: { s: 'ㄨ',    l: 'Skip It' },
    };
    const BSKY = 'https://bsky.app';

    let all = [];
    const F = { rating: '', style: '', experience: '', city: '' };
    let sort = 'recent';

    // ── Init ─────────────────────────────────────────────────
    async function init() {
      authCheck();
      const { getApprovedReviews } = await import('/auth.js');
      all = await getApprovedReviews({});
      buildCityDropdown();
      render();
    }

    async function authCheck() {
      try {
        const { initAuth } = await import('/auth.js');
        const auth = await initAuth();
        if (auth?.user) {
          const n = document.getElementById('navUser');
          n.textContent = '@' + auth.user.handle;
          n.href = '/profile.html';
        }
      } catch {}
    }

    // ── City dropdown — auto-populated from review data ──────
    function buildCityDropdown() {
      // Extract unique cities, sorted alphabetically
      const cities = [...new Set(
        all.map(r => r.city).filter(Boolean).map(c => c.trim())
      )].sort();

      if (cities.length <= 1) return; // no point showing if 0-1 cities

      const sel = document.getElementById('citySelect');
      cities.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        sel.appendChild(opt);
      });

      document.getElementById('cityRow').style.display = 'flex';

      sel.addEventListener('change', () => {
        F.city = sel.value;
        render();
      });
    }

    // ── Render ────────────────────────────────────────────────
    function render() {
      let reviews = all.filter(r => {
        if (F.rating !== '' && r.rating !== parseInt(F.rating)) return false;
        if (F.style && r.style !== F.style) return false;
        if (F.experience && r.experience !== F.experience) return false;
        if (F.city && (r.city || '').trim() !== F.city) return false;
        return true;
      });

      if (sort === 'rating') {
        reviews.sort((a, b) => b.rating - a.rating || new Date(b.created_at) - new Date(a.created_at));
      } else {
        reviews.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      }

      // Live count
      document.getElementById('liveBadge').innerHTML =
        `<div class="live-dot"></div><span>${all.length} review${all.length !== 1 ? 's' : ''}</span>`;
      document.getElementById('resultCount').textContent =
        reviews.length === all.length
          ? `${all.length} review${all.length !== 1 ? 's' : ''}`
          : `${reviews.length} of ${all.length} reviews`;

      const out = document.getElementById('output');

      if (!reviews.length) {
        out.innerHTML = `<div class="grid">
          <div class="empty">
            <div class="empty-icon">🍕</div>
            <div class="empty-title">No reviews match these filters</div>
            <div class="empty-sub">Try a different filter, or
              <a href="#" onclick="clearAll(); return false">clear all</a>.</div>
          </div></div>`;
        return;
      }

      // Group by city when not filtered to one city
      const grouped = groupByCity(reviews);
      const showGroups = !F.city && grouped.length > 1;

      let html = '';

      if (showGroups) {
        grouped.forEach(({ city, reviews: cityRevs }) => {
          html += `<div class="city-heading">◈ ${city} <span style="color:#5a3e1c;font-weight:400;letter-spacing:0;text-transform:none;font-size:10px">${cityRevs.length} review${cityRevs.length !== 1 ? 's' : ''}</span></div>`;
          html += `<div class="grid">${cityRevs.map(buildCard).join('')}</div>`;
        });
      } else {
        html = `<div class="grid">${reviews.map(buildCard).join('')}</div>`;
      }

      out.innerHTML = html;
    }

    function groupByCity(reviews) {
      const map = {};
      reviews.forEach(r => {
        const city = (r.city || r.location || 'Other').trim();
        if (!map[city]) map[city] = [];
        map[city].push(r);
      });
      return Object.entries(map)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([city, reviews]) => ({ city, reviews }));
    }

    // ── Build card ────────────────────────────────────────────
    function buildCard(r) {
      const rt     = RATINGS[r.rating] || RATINGS[1];
      const handle = r.users?.handle || 'contributor';
      const hasImg = !!r.image_url;
      const date   = new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });

      let bskyUrl = '';
      if (r.bluesky_uri) {
        const parts = r.bluesky_uri.split('/');
        bskyUrl = `${BSKY}/profile/${handle}/post/${parts[parts.length-1]}`;
      }

      const metaTags = [
        r.style    ? `<span class="style-tag">${r.style}</span>` : '',
        r.experience ? `<span class="exp-tag">${r.experience}</span>` : '',
      ].join('');

      const footer = `
        <div class="card-footer">
          <span class="card-reviewer">@${handle} · ${date}</span>
          ${bskyUrl ? `<a class="card-discuss" href="${bskyUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Discuss ↗</a>` : ''}
        </div>`;

      if (hasImg) {
        return `
          <div class="card" onclick="openDrawer('${r.id}')">
            <div class="card-img">
              <img src="${r.image_url}" alt="${r.name}" loading="lazy">
              <div class="img-rating-badge">${rt.s} ${rt.l}</div>
            </div>
            <div class="card-body">
              <div class="card-name">${r.name}</div>
              <div class="card-meta">
                <span>${r.location}</span>
                <span class="card-sep">·</span>
                ${metaTags}
              </div>
              <div class="card-excerpt">${r.notes || ''}</div>
              ${footer}
            </div>
          </div>`;
      } else {
        return `
          <div class="card no-img rat-${r.rating}" onclick="openDrawer('${r.id}')">
            <div class="card-body">
              <div class="inline-rating">
                ${rt.s} <span class="rl">${rt.l}</span>
              </div>
              <div class="card-name">${r.name}</div>
              <div class="card-meta">
                <span>${r.location}</span>
                <span class="card-sep">·</span>
                ${metaTags}
              </div>
              <div class="card-excerpt">${r.notes || ''}</div>
              ${footer}
            </div>
          </div>`;
      }
    }

    // ── Drawer ─────────────────────────────────────────────────
    window.openDrawer = function(id) {
      const r = all.find(x => x.id === id);
      if (!r) return;

      const rt     = RATINGS[r.rating] || RATINGS[1];
      const handle = r.users?.handle || 'contributor';
      const date   = new Date(r.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

      // Image
      const dImg = document.getElementById('dImg');
      dImg.innerHTML = r.image_url
        ? `<img src="${r.image_url}" alt="${r.name}" loading="lazy">`
        : `<div class="placeholder">🍕</div>`;

      document.getElementById('dName').textContent = r.name;
      document.getElementById('dRating').innerHTML =
        `${rt.s} <span class="d-rating-lbl">${rt.l}</span>`;

      // Tags
      const tags = [
        { t: r.location, hi: false },
        { t: r.style, hi: true },
        r.experience ? { t: r.experience, hi: false } : null,
      ].filter(Boolean);
      document.getElementById('dTags').innerHTML =
        tags.map(({ t, hi }) => `<span class="d-tag${hi ? ' hi' : ''}">${t}</span>`).join('');

      document.getElementById('dNotes').textContent = r.notes || '';

      // Reviewer
      document.getElementById('dReviewer').innerHTML = `
        <div class="d-avatar">${handle[0].toUpperCase()}</div>
        <div class="d-reviewer-info">
          <div class="d-reviewer-handle">@${handle}</div>
          <span class="d-reviewer-badge">Contributor</span>
        </div>
        <span class="d-reviewer-date">${date}</span>`;

      // Actions
      let actions = '';
      if (r.bluesky_uri) {
        const parts = r.bluesky_uri.split('/');
        const url = `${BSKY}/profile/${handle}/post/${parts[parts.length-1]}`;
        actions += `<a href="${url}" target="_blank" rel="noopener" class="d-btn d-btn-gold">Discuss on Bluesky ↗</a>`;
      }
      actions += `<button class="d-btn d-btn-outline" onclick="closeDrawer()">Close</button>`;
      document.getElementById('dActions').innerHTML = actions;

      document.getElementById('overlay').classList.add('open');
      document.getElementById('drawer').classList.add('open');
      document.body.style.overflow = 'hidden';
    };

    window.closeDrawer = function() {
      document.getElementById('overlay').classList.remove('open');
      document.getElementById('drawer').classList.remove('open');
      document.body.style.overflow = '';
    };

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

    // ── Filters ────────────────────────────────────────────────
    document.querySelectorAll('.f-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const f = btn.dataset.f;
        document.querySelectorAll(`[data-f="${f}"]`).forEach(b => b.classList.remove('on'));
        btn.classList.add('on');
        F[f] = btn.dataset.v;
        render();
      });
    });

    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('on'));
        btn.classList.add('on');
        sort = btn.dataset.sort;
        render();
      });
    });

    window.clearAll = function() {
      F.rating = ''; F.style = ''; F.experience = ''; F.city = '';
      document.querySelectorAll('.f-btn').forEach(b => b.classList.toggle('on', b.dataset.v === ''));
      document.getElementById('citySelect').value = '';
      render();
    };

    init();
  </script>
</body>
</html>
