<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stats — PIZZA⚡OFFICIAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'IBM Plex Mono', 'Courier New', monospace; background: #0d0800; color: #FFFFFF; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 100;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.05) 3px, rgba(0,0,0,.05) 4px);
    }
    nav {
      height: 54px; background: #0d0800; border-bottom: 1px solid #2E1C00;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; position: sticky; top: 0; z-index: 50;
    }
    .nav-logo { font-size: 14px; font-weight: 700; color: #FFFFFF; text-decoration: none; }
    .nav-logo .r { color: #FF3B30; }
    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: #9A7850; text-decoration: none; padding: 6px 10px; transition: color .15s;
    }
    .nav-link:hover { color: #FFB800; }

    .wrap { max-width: 820px; margin: 0 auto; padding: 40px 20px; }
    .page-title {
      font-size: clamp(26px, 6vw, 44px); font-weight: 700;
      letter-spacing: -.02em; color: #FFB800; line-height: 1; margin-bottom: 6px;
    }
    .page-sub { font-size: 14px; color: #C8B090; margin-bottom: 32px; line-height: 1.6; }

    /* Live indicator */
    .live {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: #4ABA5A; margin-bottom: 28px;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%; background: #4ABA5A;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(74,186,90,.4); }
      50%      { box-shadow: 0 0 0 5px rgba(74,186,90,0); }
    }

    /* Stats */
    .stats-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 32px;
    }
    @media (min-width: 500px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-card { background: #160D00; border: 1px solid #2E1C00; padding: 18px 20px; }
    .stat-val { font-size: 30px; font-weight: 700; color: #FFB800; line-height: 1; margin-bottom: 6px; }
    .stat-lbl { font-size: 10px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: #9A7850; }

    /* Style breakdown */
    .style-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px; margin-bottom: 32px;
    }
    .style-card {
      background: #160D00; border: 1px solid #2E1C00;
      padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
    }
    .style-name { font-size: 12px; font-weight: 700; color: #C8B090; }
    .style-count { font-size: 16px; font-weight: 700; color: #FFB800; }

    /* Section heading */
    .section-head {
      font-size: 10px; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: #CC9200;
      margin-bottom: 12px; padding-top: 28px; border-top: 1px solid #2E1C00;
    }

    /* Admin queue */
    .queue-card {
      background: #160D00; border: 1px solid #2E1C00;
      padding: 16px 18px; margin-bottom: 10px;
    }
    .queue-name { font-size: 14px; font-weight: 700; color: #FFFFFF; margin-bottom: 3px; }
    .queue-meta { font-size: 11px; color: #9A7850; margin-bottom: 8px; }
    .queue-excerpt { font-size: 12px; color: #C8B090; line-height: 1.6; margin-bottom: 12px; font-style: italic; }
    .queue-actions { display: flex; gap: 8px; }
    .q-approve {
      font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; padding: 6px 16px;
      background: transparent; border: 1px solid #4ABA5A; color: #4ABA5A;
      cursor: pointer; transition: all .15s;
    }
    .q-approve:hover { background: #4ABA5A; color: #0d0800; }
    .q-reject {
      font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; padding: 6px 16px;
      background: transparent; border: 1px solid #FF3B30; color: #FF3B30;
      cursor: pointer; transition: all .15s;
    }
    .q-reject:hover { background: #FF3B30; color: #FFFFFF; }

    .empty { font-size: 13px; color: #9A7850; padding: 16px 0; }
    .loading { font-size: 12px; color: #7A5830; padding: 40px 0; text-align: center; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">PIZZA<span class="r">⚡</span>OFFICIAL</a>
    <div class="nav-links">
      <a href="/database.html" class="nav-link">Database</a>
      <a href="/profile.html" class="nav-link" id="profileLink" style="display:none">Profile</a>
    </div>
  </nav>

  <div class="wrap">
    <div class="page-title">STATS</div>
    <div class="page-sub">Live numbers from the Pizza Official database.</div>
    <div class="loading" id="statsLoading">Loading…</div>
    <div id="statsContent" style="display:none"></div>
  </div>

  <script type="module">
    import { initAuth, getPublicStats, getAdminQueue } from '/auth.js';

    const RATINGS = { 3: '⭐⭐⭐', 2: '⭐⭐', 1: '⭐', 0: 'ㄨ' };
    const ADMIN_DID = 'did:plc:u5jrhjdnrgx52s6secwuilkh';

    async function main() {
      const [auth, stats] = await Promise.all([initAuth(), getPublicStats()]);
      const user = auth?.user;

      if (user) {
        document.getElementById('profileLink').style.display = '';
      }

      const s = stats || {};
      const loading = document.getElementById('statsLoading');
      const content = document.getElementById('statsContent');
      loading.style.display = 'none';
      content.style.display = 'block';

      const styles = [
        ['NY Style', s.ny_style_count], ['Neapolitan', s.neapolitan_count],
        ['Roman', s.roman_count], ['Detroit / Sicilian', s.detroit_count],
        ['Deep Dish', s.deep_dish_count], ['Tavern', s.tavern_count],
        ['Fast / Counter', s.fast_counter_count],
      ].filter(([, v]) => v > 0);

      let html = `
        <div class="live"><div class="live-dot"></div> Live database</div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-val">${s.total_reviews || 0}</div><div class="stat-lbl">Reviews</div></div>
          <div class="stat-card"><div class="stat-val">${s.cities || 0}</div><div class="stat-lbl">Cities</div></div>
          <div class="stat-card"><div class="stat-val">${s.contributors || 0}</div><div class="stat-lbl">Contributors</div></div>
          <div class="stat-card"><div class="stat-val">${s.legendary_count || 0}</div><div class="stat-lbl">Legendary</div></div>
        </div>`;

      if (styles.length) {
        html += `<div class="section-head">By style</div><div class="style-grid">`;
        styles.forEach(([name, count]) => {
          html += `<div class="style-card"><span class="style-name">${name}</span><span class="style-count">${count}</span></div>`;
        });
        html += `</div>`;
      }

      // Admin queue
      if (user?.role === 'admin') {
        const queue = await getAdminQueue();
        const reviews = queue.filter(q => q.queue_type === 'review');
        const apps    = queue.filter(q => q.queue_type === 'application');

        html += `<div class="section-head">Pending reviews (${reviews.length})</div>`;
        html += reviews.length === 0 ? `<div class="empty">All clear.</div>` :
          reviews.map(r => `
            <div class="queue-card" id="qr-${r.id}">
              <div class="queue-name">${r.subject}</div>
              <div class="queue-meta">${r.location} · ${r.style} · ${RATINGS[parseInt(r.rating)] || ''} · @${r.from_handle}</div>
              <div class="queue-excerpt">${(r.excerpt || '').slice(0, 220)}${(r.excerpt || '').length > 220 ? '…' : ''}</div>
              <div class="queue-actions">
                <button class="q-approve" onclick="act('review','${r.id}','approve',this)">Approve</button>
                <button class="q-reject" onclick="act('review','${r.id}','reject',this)">Reject</button>
              </div>
            </div>`).join('');

        html += `<div class="section-head">Pending applications (${apps.length})</div>`;
        html += apps.length === 0 ? `<div class="empty">No pending applications.</div>` :
          apps.map(a => `
            <div class="queue-card" id="qa-${a.id}">
              <div class="queue-name">@${a.from_handle}</div>
              <div class="queue-meta">${a.location || 'Location not provided'}</div>
              <div class="queue-excerpt">${(a.excerpt || '').slice(0, 300)}</div>
              <div class="queue-actions">
                <button class="q-approve" onclick="act('application','${a.id}','approve',this)">Approve</button>
                <button class="q-reject" onclick="act('application','${a.id}','reject',this)">Reject</button>
              </div>
            </div>`).join('');
      }

      content.innerHTML = html;
    }

    window.act = async function(type, id, action, btn) {
      btn.disabled = true;
      btn.textContent = action === 'approve' ? 'Approving…' : 'Rejecting…';
      try {
        const res = await fetch('/.netlify/functions/approve', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ admin_did: ADMIN_DID, type, id, action }),
        });
        if (!res.ok) throw new Error(await res.text());
        const card = document.getElementById(`q${type[0]}-${id}`);
        if (card) { card.style.opacity = '.35'; card.style.pointerEvents = 'none'; }
        btn.textContent = action === 'approve' ? '✓ Approved' : '✗ Rejected';
      } catch (e) {
        btn.disabled = false; btn.textContent = 'Error — retry';
      }
    };

    main();
  </script>
</body>
</html>
